<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Information</title>
    <meta name="description"
      content="Our contact information for those who wish to get in touch with us">
    <meta name="author" content="McKenna Neilson">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo_image_1.jpeg" alt="Rafting Website Logo" width="200">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Get in Touch!</h1>
        <div class="contact-info">
            <h2>White Water Rafting Company</h2>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
            <div class="map-placeholder"> <!-- Placeholder for an embedded map --> </div>
        </div>
        <form action="#" method="post"> <label for="name">Name:</label> <input type="text" id="name"
              name="name" placeholder="Placeholder"> <label for="email">Email:</label> <input
              type="email" id="email" name="email" placeholder="Placeholder">
            <fieldset>
                <legend>Message Purpose:</legend> <input type="radio" id="general" name="purpose"
                  value="general"> <label for="general">General Inquiry</label><br> <input
                  type="radio" id="reservation" name="purpose" value="reservation"> <label
                  for="reservation">Reservation Question</label><br> <input type="radio"
                  id="website" name="purpose" value="website"> <label for="website">Website
                    Suggestion</label>
            </fieldset> <label for="message">Message:</label> <textarea id="message" name="message"
              rows="4" placeholder="Type here"></textarea> <label> <input type="checkbox"
                  name="subscribe" value="yes"> Please Subscribe me to the monthly newsletter
            </label>
            <button type="submit">Get in Touch!</button>
        </form>
    </main>
    <footer>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg" alt="Instagram"></a>
        </nav>
        <p>&copy; 2026 Willamette River Rafting</p>
        <a href="https://jigsaw.w3.org/css-validator/check/referer">
            <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="Valid CSS!" />
        </a>
    </footer>
</body>

</html>
